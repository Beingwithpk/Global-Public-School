<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Global Public School</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dark: #9A7A2E;
    --deep: #0A0A0F;
    --surface: #111118;
    --surface2: #1A1A24;
    --surface3: #22222E;
    --text: #F0EBE0;
    --text-muted: #9A917E;
    --border: rgba(201,168,76,0.2);
  }
  html { scroll-behavior: smooth; }
  body { background: var(--deep); color: var(--text); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--deep); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }

  /* Hero */
  .hero-wrap { position: relative; height: 100vh; overflow: hidden; }
  .hero-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; will-change: transform; transition: transform 0.05s linear; }
  .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(10,10,15,0.5) 0%, rgba(10,10,15,0.3) 40%, rgba(10,10,15,0.85) 100%); }
  .hero-content { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 2; padding: 0 1.5rem; }

  /* Gold line */
  .gold-line { display: inline-flex; align-items: center; gap: 12px; }
  .gold-line::before, .gold-line::after { content: ''; flex: 1; height: 1px; background: var(--gold); width: 60px; }

  /* Nav */
  .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 0 2.5rem; height: 76px; display: flex; align-items: center; justify-content: space-between; transition: background 0.4s, backdrop-filter 0.4s, box-shadow 0.4s, height 0.3s; }
  .nav.scrolled { background: rgba(8,8,12,0.96); backdrop-filter: blur(20px) saturate(1.4); border-bottom: 1px solid rgba(201,168,76,0.15); box-shadow: 0 1px 40px rgba(0,0,0,0.6); height: 68px; }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; color: var(--gold); letter-spacing: 2px; display: flex; align-items: center; gap: 14px; text-transform: uppercase; }
  .nav-logo-name { display: flex; flex-direction: column; gap: 1px; }
  .nav-logo-name span:first-child { font-size: 1rem; font-weight: 700; color: var(--gold); letter-spacing: 2px; line-height: 1; }
  .nav-logo-name span:last-child { font-size: 0.5rem; font-weight: 400; color: var(--text-muted); letter-spacing: 4px; text-transform: uppercase; font-family: 'Montserrat', sans-serif; }
  .nav-crest { width: 40px; height: 40px; border: 1px solid var(--gold); position: relative; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: var(--gold); flex-shrink: 0; }
  .nav-crest::before { content: ''; position: absolute; inset: 3px; border: 1px solid rgba(201,168,76,0.3); }
  .nav-center { display: flex; align-items: center; gap: 0.25rem; }
  .nav-links { display: flex; gap: 0; list-style: none; }
  .nav-links li { position: relative; }
  .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.68rem; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; transition: color 0.2s; padding: 0.5rem 1rem; display: block; }
  .nav-links a:hover { color: var(--gold); }
  .nav-links a::after { content: ''; position: absolute; bottom: -2px; left: 1rem; right: 1rem; height: 1px; background: var(--gold); transform: scaleX(0); transition: transform 0.25s; }
  .nav-links a:hover::after { transform: scaleX(1); }
  .nav-btn { background: transparent; border: 1px solid rgba(201,168,76,0.6); color: var(--gold); padding: 0.55rem 1.5rem; font-family: 'Montserrat', sans-serif; font-size: 0.65rem; letter-spacing: 2.5px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
  .nav-btn::before { content: ''; position: absolute; inset: 0; background: var(--gold); transform: translateX(-100%); transition: transform 0.3s; z-index: -1; }
  .nav-btn:hover { color: var(--deep); border-color: var(--gold); }
  .nav-btn:hover::before { transform: translateX(0); }
  .nav-divider { width: 1px; height: 18px; background: rgba(201,168,76,0.2); margin: 0 1.5rem; }
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
  .hamburger span { width: 24px; height: 1px; background: var(--gold); display: block; transition: all 0.3s; }

  /* Sections */
  .section { padding: 7rem 2rem; max-width: 1200px; margin: 0 auto; }
  .section-full { padding: 7rem 0; background: var(--surface); }
  .section-full .section { padding: 0 2rem; }

  /* Tag */
  .tag { display: inline-flex; align-items: center; gap: 8px; font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
  .tag::before { content: ''; width: 28px; height: 1px; background: var(--gold); }

  /* Headings */
  .display-heading { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 5vw, 3.8rem); font-weight: 700; line-height: 1.15; }
  .display-heading em { font-style: italic; color: var(--gold); }
  .sub-heading { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 3vw, 2.4rem); font-weight: 600; line-height: 1.3; }
  .body-text { color: var(--text-muted); line-height: 1.85; font-size: 0.9rem; font-weight: 300; }

  /* Cards */
  .card { background: var(--surface2); border: 1px solid var(--border); padding: 2.5rem; transition: border-color 0.3s, transform 0.3s; }
  .card:hover { border-color: var(--gold); transform: translateY(-4px); }
  .card-icon { width: 52px; height: 52px; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; font-size: 1.4rem; }

  /* Grid helpers */
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; }
  .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 2rem; align-items: center; }
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; }

  /* Stats */
  .stat-num { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 700; color: var(--gold); line-height: 1; }

  /* Principal */
  .principal-quote { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.2rem, 2.5vw, 1.6rem); font-style: italic; line-height: 1.7; color: var(--text); border-left: 3px solid var(--gold); padding-left: 2rem; }
  .principal-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; filter: grayscale(20%); }
  .principal-frame { position: relative; }
  .principal-frame::after { content: ''; position: absolute; bottom: -16px; right: -16px; width: 100%; height: 100%; border: 1px solid var(--gold-dark); z-index: -1; }

  /* Achievement */
  .achievement-card { background: var(--surface2); border: 1px solid var(--border); padding: 1.5rem; display: flex; gap: 1rem; align-items: flex-start; transition: border-color 0.3s; }
  .achievement-card:hover { border-color: var(--gold); }
  .ach-num { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 900; color: var(--gold); line-height: 1; min-width: 60px; }

  /* Gallery */
  .gallery-grid { display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(2, 220px); gap: 6px; }
  .gallery-item { overflow: hidden; position: relative; background: var(--surface2); cursor: pointer; }
  .gallery-item.tall { grid-row: span 2; }
  .gallery-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s, filter 0.5s; filter: brightness(0.7) saturate(0.8); }
  .gallery-item:hover .gallery-img { transform: scale(1.06); filter: brightness(0.9) saturate(1); }
  .gallery-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(10,10,15,0.8), transparent); display: flex; align-items: flex-end; padding: 1rem; opacity: 0; transition: opacity 0.3s; }
  .gallery-item:hover .gallery-overlay { opacity: 1; }

  /* Admissions */
  .step { display: flex; gap: 1.5rem; align-items: flex-start; padding: 1.5rem; background: var(--surface2); border: 1px solid var(--border); transition: border-color 0.3s; }
  .step:hover { border-color: var(--gold); }
  .step-num { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 900; color: var(--gold); opacity: 0.4; line-height: 1; min-width: 50px; }

  /* Contact */
  .contact-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 0.9rem 1.2rem; font-family: 'Montserrat', sans-serif; font-size: 0.85rem; outline: none; transition: border-color 0.3s; }
  .contact-input:focus { border-color: var(--gold); }
  .contact-input::placeholder { color: var(--text-muted); }
  .submit-btn { background: var(--gold); color: var(--deep); border: none; padding: 1rem 2.5rem; font-family: 'Montserrat', sans-serif; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; cursor: pointer; transition: background 0.3s; }
  .submit-btn:hover { background: var(--gold-light); }

  /* Footer */
  .footer { background: var(--deep); border-top: 1px solid var(--border); padding: 4rem 2rem 2rem; }
  .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 3rem; max-width: 1200px; margin: 0 auto; }
  .footer-links { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
  .footer-links a { color: var(--text-muted); text-decoration: none; font-size: 0.82rem; transition: color 0.2s; }
  .footer-links a:hover { color: var(--gold); }
  .footer-bottom { max-width: 1200px; margin: 3rem auto 0; border-top: 1px solid var(--border); padding-top: 1.5rem; display: flex; justify-content: space-between; align-items: center; }

  /* Divider */
  .gold-divider { height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); margin: 0; }

  /* Scroll reveal */
  .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.7s, transform 0.7s; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* Scroll progress */
  .scroll-progress { position: fixed; top: 0; left: 0; height: 2px; background: linear-gradient(to right, var(--gold-dark), var(--gold-light)); z-index: 200; transition: width 0.1s linear; }

  /* Mobile */
  @media (max-width: 900px) {
    .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
    .footer-grid { grid-template-columns: 1fr 1fr; }
    .gallery-grid { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
    .gallery-item.tall { grid-row: span 1; }
    .hamburger { display: flex; }
    .nav-links, .nav-btn, .nav-divider { display: none; }
    .nav-links.open { display: flex; flex-direction: column; position: absolute; top: 68px; left: 0; right: 0; background: rgba(8,8,12,0.98); padding: 2rem; gap: 0.5rem; border-bottom: 1px solid var(--border); backdrop-filter: blur(20px); }
    .nav-links.open + .nav-btn { display: block; margin: 0 2rem 2rem; }
  }
  @media (max-width: 560px) {
    .grid-3, .grid-4 { grid-template-columns: 1fr; }
    .footer-grid { grid-template-columns: 1fr; }
    .gallery-grid { grid-template-columns: 1fr; }
  }

  /* News cards */
  .news-card { background: var(--surface2); border: 1px solid var(--border); overflow: hidden; transition: border-color 0.3s, transform 0.3s; }
  .news-card:hover { border-color: var(--gold); transform: translateY(-4px); }
  .news-img { width: 100%; height: 160px; object-fit: cover; filter: grayscale(30%); transition: filter 0.3s; }
  .news-card:hover .news-img { filter: grayscale(0%); }
  .news-body { padding: 1.4rem; }
  .news-tag { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }

  /* Marquee */
  .marquee-wrap { overflow: hidden; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 1rem 0; background: var(--surface2); }
  .marquee { display: flex; gap: 3rem; width: max-content; animation: marquee 20s linear infinite; }
  .marquee-item { font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); display: flex; align-items: center; gap: 1rem; white-space: nowrap; }
  .marquee-item::after { content: '◆'; color: var(--gold); font-size: 0.5rem; }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* Hero scroll cue */
  .scroll-cue { position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 0.5rem; animation: bounce 2s infinite; z-index: 3; }
  .scroll-cue span { font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); }
  .scroll-cue svg { color: var(--gold); }
  @keyframes bounce { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(8px); } }

  /* WhatsApp CTA Section */
  .wa-cta-section { background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 5rem 2rem; position: relative; overflow: hidden; }
  .wa-cta-section::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 100%, rgba(37,211,102,0.05) 0%, transparent 65%); pointer-events: none; }
  .wa-cta-inner { max-width: 800px; margin: 0 auto; text-align: center; position: relative; z-index: 1; }
  .wa-cta-btn { display: inline-flex; align-items: center; gap: 0.85rem; background: transparent; border: 1px solid #25D366; color: #25D366; padding: 1rem 2.5rem; font-family: 'Montserrat', sans-serif; font-size: 0.75rem; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.35s; position: relative; overflow: hidden; }
  .wa-cta-btn::before { content: ''; position: absolute; inset: 0; background: #25D366; transform: scaleX(0); transform-origin: left; transition: transform 0.35s; z-index: -1; }
  .wa-cta-btn:hover { color: var(--deep); }
  .wa-cta-btn:hover::before { transform: scaleX(1); }
  .wa-cta-ornament { display: flex; align-items: center; gap: 1.5rem; justify-content: center; margin-bottom: 1.5rem; }
  .wa-cta-ornament::before, .wa-cta-ornament::after { content: ''; flex: 1; max-width: 80px; height: 1px; background: linear-gradient(to right, transparent, rgba(37,211,102,0.4)); }
  .wa-cta-ornament::after { background: linear-gradient(to left, transparent, rgba(37,211,102,0.4)); }

  /* Tab active */
  .tab-active { border-color: var(--gold) !important; color: var(--gold) !important; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── DATA ── */
const navLinks = ["Home","About Us","Admissions","Gallery","Achievements","Principal","News","Contact"];

const stats = [
  { num: "2014", label: "Est. Year" },
  { num: "5,200+", label: "Students Enrolled" },
  { num: "20+", label: "Faculty Members" },
  { num: "98%", label: "Pass Rate" },
];

const pillars = [
  { icon: "🎓", title: "Academic Excellence", desc: "Rigorous curriculum designed to cultivate critical thinking, creativity, and lifelong learning across all disciplines." },
  { icon: "⚽", title: "Sports & Athletics", desc: "State-of-the-art facilities supporting over 20 sports disciplines, nurturing champions on and off the field." },
  { icon: "🎨", title: "Arts & Culture", desc: "A vibrant arts program encompassing music, fine arts, theatre, and cultural studies to develop well-rounded individuals." },
  { icon: "🌐", title: "Global Citizenship", desc: "International exchange programs and Model UN preparing students to lead confidently on the world stage." },
  { icon: "🔬", title: "STEM Innovation", desc: "Cutting-edge laboratories and technology centers driving the next generation of scientists and engineers." },
  { icon: "🤝", title: "Community Service", desc: "Embedded community outreach initiatives that build character, empathy, and social responsibility." },
];

const achievements = [
  { num: "01", title: "National Science Olympiad", year: "2024", desc: "Gold medal at the National Science Olympiad, outperforming 400+ schools." },
  { num: "02", title: "CBSE Topper Award", year: "2024", desc: "Three students ranked in top 10 nationally in CBSE Class XII examinations." },
  { num: "03", title: "Inter-State Chess Championship", year: "2023", desc: "Our team secured first position at the Inter-State Chess Championship." },
  { num: "04", title: "Green School Initiative", year: "2023", desc: "Recognised as a Platinum Green School by the Ministry of Environment." },
  { num: "05", title: "Cultural Festival Award", year: "2023", desc: "Best Cultural Program at the National Youth Festival, New Delhi." },
  { num: "06", title: "Digital Innovation Award", year: "2024", desc: "Top honors for our AI-powered Smart Classroom project at TechFest IIT." },
];

const admissionSteps = [
  { step: "01", title: "Online Registration", desc: "Complete the online registration form with student and parent details on our admissions portal." },
  { step: "02", title: "Document Submission", desc: "Submit academic records, birth certificate, and previous school documents for verification." },
  { step: "03", title: "Entrance Assessment", desc: "Appear for our comprehensive entrance assessment designed to evaluate aptitude and potential." },
  { step: "04", title: "Personal Interview", desc: "Shortlisted candidates attend a personal interaction with the admissions committee." },
  { step: "05", title: "Offer Letter", desc: "Successful candidates receive an official offer letter with enrollment details within 7 working days." },
];

const galleryItems = [
  { color: "#1A1A2E", label: "Science Lab", tall: true },
  { color: "#16213E", label: "Library" },
  { color: "#0F3460", label: "Sports Ground" },
  { color: "#1B1B2F", label: "Auditorium" },
  { color: "#162447", label: "Art Studio" },
];

const news = [
  { tag: "Academic", title: "Annual Science Fair 2024 — Students Showcase Groundbreaking Projects", date: "June 2, 2024", color: "#1A2744" },
  { tag: "Events", title: "Inter-School Debate Championship: GPS Wins Gold", date: "May 20, 2024", color: "#1A2D1A" },
  { tag: "Admissions", title: "Admissions Open for 2025-26: Early Bird Deadline July 31", date: "May 10, 2024", color: "#2D1A1A" },
];

/* ── HOOKS ── */
function useScroll() {
  const [scrollY, setScrollY] = useState(0);
  useEffect(() => {
    const fn = () => setScrollY(window.scrollY);
    window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return scrollY;
}

function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
    }, { threshold: 0.12 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

/* ── COMPONENTS ── */

function ScrollProgress({ scrollY }) {
  const [max, setMax] = useState(1);
  useEffect(() => { setMax(document.body.scrollHeight - window.innerHeight); }, []);
  const pct = Math.min(100, (scrollY / max) * 100);
  return <div className="scroll-progress" style={{ width: pct + '%' }} />;
}

function Nav({ scrollY, onContactClick, onPageClick }) {
  const [open, setOpen] = useState(false);
  const scrolled = scrollY > 60;
  const pageLinks = ['Gallery', 'News', 'Contact'];
  return (
    <nav className={`nav ${scrolled ? 'scrolled' : ''}`}>
      <div className="nav-logo">
        <div className="nav-crest">⚜</div>
        <div className="nav-logo-name">
          <span>Global Public School</span>
          <span>Est. 2014 · Benipur, Bihar</span>
        </div>
      </div>
      <ul className={`nav-links ${open ? 'open' : ''}`}>
        {navLinks.map(l => (
          <li key={l}>
            {pageLinks.includes(l) ? (
              <a href="#" onClick={e => {
                e.preventDefault(); setOpen(false);
                if (l === 'Contact') onContactClick();
                else onPageClick(l.toLowerCase());
              }}>{l}</a>
            ) : (
              <a href={`#${l.toLowerCase().replace(/ /g,'-')}`} onClick={() => setOpen(false)}>{l}</a>
            )}
          </li>
        ))}
      </ul>
      <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
        <div className="nav-divider" />
        <button className="nav-btn" style={{ display: open ? 'block' : '' }}>Apply Now</button>
      </div>
      <div className="hamburger" onClick={() => setOpen(!open)}>
        <span style={{ transform: open ? 'rotate(45deg) translateY(6px)' : '' }}/>
        <span style={{ opacity: open ? 0 : 1 }}/>
        <span style={{ transform: open ? 'rotate(-45deg) translateY(-6px)' : '' }}/>
      </div>
    </nav>
  );
}

function Hero({ scrollY }) {
  const parallax = scrollY * 0.45;
  const opacity = Math.max(0, 1 - scrollY / 500);
  return (
    <section id="home" className="hero-wrap">
      <video
        className="hero-video"
        autoPlay muted loop playsInline
        style={{ transform: `scale(1.12) translateY(${parallax}px)` }}
        poster=""
      >
        <source src="Transition_mountains_to_school_a…_202606062059.mp4" type="video/mp4" />
        {/* Fallback: gradient background if video not found */}
      </video>
      {/* Fallback bg in case video doesn't load */}
      
      <div className="hero-overlay" />
      <div className="hero-content" style={{ opacity }}>
        <div className="tag" style={{ marginBottom: '1.5rem' }}>Est. 2014 · Excellence · Integrity · Innovation</div>
        <p style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: '1rem', letterSpacing: '6px', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: '0.8rem', fontWeight: 300 }}>Welcome to</p>
        <h1 className="display-heading" style={{ fontSize: 'clamp(2.8rem, 7vw, 5.5rem)', marginBottom: '1.5rem', textShadow: '0 4px 30px rgba(0,0,0,0.6)' }}>
          Global<br /><em>Public School</em>
        </h1>
        <div className="gold-line" style={{ marginBottom: '1.5rem' }}>
          <span style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: '1.05rem', color: 'var(--text-muted)', fontStyle: 'italic', letterSpacing: '1px' }}>Shaping minds. Inspiring futures.</span>

function ContactPage({ onBack }) {
  useEffect(() => { window.scrollTo(0, 0); }, []);
  const [form, setForm] = useState({ name: '', email: '', phone: '', enquiry: '', message: '' });
  const [status, setStatus] = useState('idle');
  const [error, setError] = useState('');

  function handleChange(e) { setForm(prev => ({ ...prev, [e.target.name]: e.target.value })); }
  function validate() {
    if (!form.name.trim()) return 'Please enter your name.';
    if (!form.message.trim()) return 'Please enter a message.';
    return null;
  }
  function handleSubmit() {
    const err = validate(); if (err) { setError(err); return; }
    setError('');
    const waPhone = WA_PHONE;
    const parts = [
      `*New Enquiry — Global Public School*`,
      `Name: ${form.name}`,
      form.email   ? `Email: ${form.email}`   : null,
      form.phone   ? `Phone: ${form.phone}`   : null,
      form.enquiry ? `Type: ${form.enquiry}`  : null,
      `Message: ${form.message}`,
    ].filter(Boolean).join('\n');
    const url = `https://wa.me/${waPhone}?text=${encodeURIComponent(parts)}`;
    window.open(url, '_blank');
    setStatus('success');
    setForm({ name: '', email: '', phone: '', enquiry: '', message: '' });
  }

  return (
    <div style={{ minHeight: '100vh', background: 'var(--deep)', paddingTop: '72px' }}>

                <button className="submit-btn" onClick={handleSubmit}
                  style={{ alignSelf: 'flex-start', marginTop: '0.5rem', display: 'flex', alignItems: 'center', gap: '0.6rem' }}>
                  <svg width="16" height="16" viewBox="0 0 32 32" fill="currentColor"><path d="M16 2C8.268 2 2 8.268 2 16c0 2.46.664 4.76 1.82 6.74L2 30l7.46-1.8A13.94 13.94 0 0016 30c7.732 0 14-6.268 14-14S23.732 2 16 2zm6.22 19.9c-.34-.17-2-.98-2.31-1.1-.31-.11-.54-.17-.77.17-.23.34-.88 1.1-1.08 1.32-.2.23-.4.25-.74.08-.34-.17-1.44-.53-2.74-1.69-1.01-.9-1.7-2.01-1.9-2.35-.2-.34-.02-.52.15-.69.15-.15.34-.4.51-.6.17-.2.23-.34.34-.57.11-.23.06-.43-.03-.6-.08-.17-.77-1.85-1.05-2.53-.28-.67-.56-.58-.77-.59h-.65c-.23 0-.6.08-.91.4-.31.31-1.2 1.17-1.2 2.85s1.23 3.3 1.4 3.53c.17.23 2.42 3.7 5.87 5.18.82.35 1.46.56 1.96.72.82.26 1.57.22 2.16.13.66-.1 2-.82 2.28-1.6.28-.78.28-1.45.2-1.6-.08-.14-.31-.22-.65-.39z"/></svg>
                  Send via WhatsApp
                </button>
              </div>
            )}
          </div>
        </div>
      </div>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}

function App() {
  const [page, setPage] = useState('home');
  const scrollY = useScroll();
  useReveal();

  const goHome = () => { setPage('home'); setTimeout(() => window.scrollTo(0,0), 0); };
  const goPage = (p) => { setPage(p); window.scrollTo(0,0); };

  if (page === 'contact') return <ContactPage onBack={goHome} />;
  if (page === 'gallery') return <GalleryPage onBack={goHome} />;
  if (page === 'news')    return <NewsPage    onBack={goHome} />;

  return (
    <div>
      <ScrollProgress scrollY={scrollY} />
      <Nav scrollY={scrollY} onContactClick={() => goPage('contact')} onPageClick={goPage} />
      <Hero scrollY={scrollY} onContactClick={() => goPage('contact')} />
      <Marquee />
      <About />
      <div className="gold-divider" />
      <Principal />
      <div className="gold-divider" />
      <Achievements />
      <div className="gold-divider" />
      <Gallery />
      <div className="gold-divider" />
      <Admissions />
      <div className="gold-divider" />
      <News onViewAll={() => goPage('news')} />
      <div className="gold-divider" />
      <WhatsAppCTA />
      <div className="gold-divider" />
      <Footer onContactClick={() => goPage('contact')} onPageClick={goPage} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
